name: Build & deploy

on:
  push:
    branches:
      - release

jobs:
  build:
    name: 😵‍💫 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🌍 Checkout code
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install packages
        run: bun install

      - name: 🔧 Build project
        run: bun run build

      - name: 🆙 Upload to SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          source: "./dist/*"
          target: ${{ secrets.TARGET }}
          overwrite: true
          strip_components: 1